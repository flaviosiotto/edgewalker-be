name: Build And Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-production-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
  DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
  DOKPLOY_APPLICATION_ID: ${{ vars.DOKPLOY_APPLICATION_ID }}
  DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -eu

          missing=""

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            missing="${missing} DOCKERHUB_USERNAME"
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            missing="${missing} DOCKERHUB_TOKEN"
          fi

          if [ -z "${IMAGE_NAME}" ]; then
            missing="${missing} DOCKERHUB_REPOSITORY"
          fi

          if [ -n "${missing}" ]; then
            echo "Missing required GitHub secrets/variables:${missing}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Dokploy deployment
        if: ${{ env.DOKPLOY_URL != '' && env.DOKPLOY_APPLICATION_ID != '' && env.DOKPLOY_API_KEY != '' }}
        run: |
          set -eu
          curl -fsS -X POST "${DOKPLOY_URL}/api/application.deploy" \
            -H 'accept: application/json' \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}"